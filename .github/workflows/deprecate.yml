name: Deprecate npm package

# Manually marks an npm package (all matching versions) as deprecated, so `npm install`
# prints a warning pointing users to the successor. Run it from the Actions tab:
#   Actions -> "Deprecate npm package" -> Run workflow.
# To UN-deprecate, run again with an empty message.
# Requires the NPM_TOKEN repo secret.

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'npm package name'
        required: true
        default: '@ackplus/react-tanstack-data-table'
      version_range:
        description: 'Version range ("*" = all versions, or e.g. ">=1.0.0")'
        required: true
        default: '*'
      message:
        description: 'Deprecation message (empty string un-deprecates)'
        required: true
        default: '⚠️ Deprecated — replaced by @ackplus/mui-tanstack-data-grid. See https://github.com/ack-solutions/react-tanstack-data-table'

jobs:
  deprecate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Deprecate
        run: npm deprecate "${{ inputs.package }}@${{ inputs.version_range }}" "${{ inputs.message }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
